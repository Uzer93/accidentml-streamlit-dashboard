name: Pytest CI

# -----------------------------------------------------------------------------
# This workflow runs the unit test suite in GitHub Actions.
# It is intentionally small and focused so that test failures are easy to
# understand and debug.
# -----------------------------------------------------------------------------

on:
  # Run the workflow when code is pushed to the main long-lived branches
  push:
    branches:
      - master
      - main

  # Also run it for pull requests targeting any branch
  pull_request:

jobs:
  tests:
    # Use the latest Ubuntu runner provided by GitHub Actions
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Step 1: check out the repository so the workflow can access the code
      # -----------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: install the requested Python version
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # Step 3: upgrade pip and install project dependencies
      # We install from requirements.txt because your tests depend on the same
      # libraries used by the project code.
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # Step 4: run the pytest suite
      # The -q flag keeps the output shorter and easier to read in CI logs.
      # -----------------------------------------------------------------------
      - name: Run unit tests
        run: pytest -q